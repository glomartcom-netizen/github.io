<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimeX Staking Dashboard</title>
    <script type="module">
        import { createAppKit } from 'https://esm.sh/@reown/appkit'
        import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5'
        import { bsc } from 'https://esm.sh/@reown/appkit/networks'

        // 1. Get Project ID from your input
        const projectId = 'f9471d926852cbae4eb35a8b39c69bf9'

        // 2. Configure Metadata
        const metadata = {
            name: 'DimeX Staking',
            description: 'DimeX Staking Protocol',
            url: window.location.origin,
            icons: ['https://your-website.com/logo.png']
        }

        // 3. Create the Modal
        const modal = createAppKit({
            adapters: [new Ethers5Adapter()],
            networks: [bsc],
            metadata,
            projectId,
            features: {
                analytics: true 
            }
        })

        // Global function to open the modal
        window.openConnectModal = () => modal.open()
    </script>

    <style>
        .connect-btn {
            background-color: #f1b80d;
            color: black;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav style="display: flex; justify-content: space-between; padding: 20px;">
        <h1>DimeX</h1>
        <button class="connect-btn" onclick="openConnectModal()">Connect Wallet</button>
    </nav>

    <div style="text-align: center; margin-top: 50px;">
        <appkit-button></appkit-button>
    </div>

</body>
</html>
