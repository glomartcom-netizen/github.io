<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DimeX | Professional Staking Dashboard</title>  
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>  
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">  
    <style>  
        :root { --gold: #f1b80d; --bg: #0a0a0a; --card: #161616; --text: #fff; --red: #ff4444; }  
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }  
        .container { max-width: 900px; margin: auto; }  
        .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; transition: all 0.4s ease; }  /* State Visuals */  
    .expired-state { opacity: 0.35; filter: grayscale(1); pointer-events: none; }  
    .btn-expired { background: #222 !important; color: #555 !important; border: 1px solid #333 !important; }  

    #networkBanner { display: none; background: var(--red); color: #fff; text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }  
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }  
    .btn { padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; width: 100%; transition: 0.3s; }  
    .btn-gold { background: var(--gold); color: #000; }  
    .btn-gold:disabled { cursor: not-allowed; opacity: 0.6; }  
      
    .progress-bg { width: 100%; background: #222; height: 12px; border-radius: 10px; margin: 10px 0; overflow: hidden; }  
    #limitProgress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), #ff8c00); transition: 1s; }  
    #timerSection { display: none; background: #300; border: 1px solid var(--red); padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; }  
      
    .loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }  
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }  
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }  
</style>

</head>  
<body>  <div id="loader" class="loading-overlay">  
    <div class="spinner"></div>  
    <p style="margin-top: 15px; font-weight: 600;">Confirming on Blockchain...</p>  
</div>  <div class="container">  
    <div id="networkBanner">⚠️ INCORRECT NETWORK: Switch to BSC Mainnet</div>  <header style="display:flex; justify-content: space-between; align-items: center; padding: 10px 0;">  
    <h2 style="color: var(--gold); margin:0;">DIMEX <span id="adminTag" style="display:none; font-size: 10px; background: #3a2a00; color:var(--gold); padding: 3px 7px; border-radius: 4px; vertical-align: middle; margin-left: 8px;">ADMIN</span></h2>  
    <appkit-button></appkit-button>  
</header>  

<div class="section" id="capSection">  
    <div style="display:flex; justify-content: space-between; font-size: 14px; font-weight: 600;">  
        <span>Earning Limit (400%)</span>  
        <span id="pctText">0%</span>  
    </div>  
    <div class="progress-bg"><div id="limitProgress"></div></div>  
    <small id="limitLabel" style="color:#aaa;">Remaining Cap: 0.00 DMX</small>  
      
    <div id="timerSection">  
        <div id="countdown" style="font-size: 26px; font-weight: 800; color: var(--red); letter-spacing: 1px;">00:00:00</div>  
        <p id="timerMsg" style="margin:5px 0; font-size:12px; font-weight: 600;">Grace Period Active: Restake before expiry.</p>  
    </div>  
</div>  

<div class="grid" id="mainStats">  
    <div class="section" style="text-align: center;">  
        <h3 style="font-size: 12px; color: #888; text-transform: uppercase; margin: 0 0 10px 0;">Total Staked</h3>  
        <p id="staked" style="font-size: 22px; font-weight: 700; margin: 0;">0.00</p>  
    </div>  
    <div class="section" style="text-align: center;">  
        <h3 style="font-size: 12px; color: #888; text-transform: uppercase; margin: 0 0 10px 0;">Claimable</h3>  
        <p id="claimable" style="font-size: 22px; font-weight: 700; margin: 0; color: var(--gold);">0.00</p>  
    </div>  
    <div class="section" style="text-align: center;">  
        <h3 style="font-size: 12px; color: #888; text-transform: uppercase; margin: 0 0 10px 0;">Total Earned</h3>  
        <p id="earned" style="font-size: 22px; font-weight: 700; margin: 0;">0.00</p>  
    </div>  
</div>  

<div class="grid" style="grid-template-columns: 1fr 1fr; margin-bottom:15px;">  
    <button id="claimBtn" class="btn btn-gold" onclick="handleClaim()">CLAIM REWARDS</button>  
    <button id="restakeBtn" class="btn btn-gold" style="background:#fff;" onclick="handleRestake()">RESTAKE NOW</button>  
</div>  

<div id="adminPanel" style="display:none;" class="section">  
    <h3 style="color: var(--gold); margin-top:0;">Management Console</h3>  
    <div style="display: flex; gap: 10px; align-items: flex-end;">  
        <div style="flex-grow: 1;">  
            <label style="font-size: 11px; color: #888; display: block; margin-bottom: 5px;">Set Daily ROI (Basis Points: 100 = 1%)</label>  
            <input type="number" id="newRate" placeholder="e.g. 50" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; border-radius: 8px; box-sizing: border-box;">  
        </div>  
        <button class="btn btn-gold" style="width:100px; padding:12px;" onclick="updateRate()">UPDATE</button>  
    </div>  
    <button class="btn btn-gold" style="background:var(--red); color:#fff; margin-top:20px;" onclick="handleEmergency()">EMERGENCY WITHDRAW USDT</button>  
</div>

</div>  <script type="module">  
    import { createAppKit } from 'https://esm.sh/@reown/appkit'  
    import { Ethers5Adapter } from 'https://esm.sh/@reown/appkit-adapter-ethers5'  
    import { bsc } from 'https://esm.sh/@reown/appkit/networks'  
  
    // --- CONFIGURATION ---  
    const projectId = 'f9471d926852cbae4eb35a8b39c69bf9';  
    const contractAddr = "0xYOUR_CONTRACT_ADDRESS"; // REPLACE THIS  
    const USDT_ADDR = "0x55d398326f99059fF775485246999027B3197955";  
  
    // HARD STOP: Validate Config  
    if(!ethers.utils.isAddress(contractAddr)){  
        alert("CRITICAL: Invalid Contract Address in Script.");  
        throw new Error("DApp stopped: Invalid Contract Address.");  
    }  
  
    const ABI = [  
        "function owner() view returns(address)",  
        "function getUserInfo(address) view returns(uint256,uint256,uint256,uint256,uint256,uint256,uint256)",  
        "function getClaimable(address) view returns(uint256)",  
        "function claim() external",  
        "function restake() external",  
        "function setRewardRate(uint256,uint256) external",  
        "function emergencyWithdrawToken(address, uint256) external"  
    ];  
  
    const modal = createAppKit({  
        adapters: [new Ethers5Adapter()],  
        networks: [bsc],  
        metadata: { name: 'DimeX', url: window.location.origin },  
        projectId  
    });  
  
    let wallet, contract, timerInt, refreshInterval, isPending = false;  
  
    // Reactivity: Chain & Account Listeners  
    if (window.ethereum) {  
        window.ethereum.on('chainChanged', () => window.location.reload());  
        window.ethereum.on('accountsChanged', () => window.location.reload());  
    }  
  
    modal.subscribeAccount(async (state) => {  
        if (state.isConnected) {  
            wallet = state.address;  
            await enforceBSC();  
            initApp();  
        } else { cleanup(); }  
    });  
  
    async function enforceBSC() {  
        try {  
            const provider = new ethers.providers.Web3Provider(window.ethereum);  
            const { chainId } = await provider.getNetwork();  
            if (chainId !== 56) {  
                document.getElementById("networkBanner").style.display = "block";  
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x38' }] });  
            } else { document.getElementById("networkBanner").style.display = "none"; }  
        } catch (e) { document.getElementById("networkBanner").style.display = "block"; }  
    }  
  
    function initApp() {  
        if (refreshInterval) clearInterval(refreshInterval);  
        const provider = new ethers.providers.Web3Provider(window.ethereum);  
        contract = new ethers.Contract(contractAddr, ABI, provider.getSigner());  
        loadData();  
        refreshInterval = setInterval(loadData, 10000);  
    }  
  
    async function loadData() {  
        if (!contract || isPending || !wallet) return;  
        try {  
            const [info, claimable, owner] = await Promise.all([  
                contract.getUserInfo(wallet),  
                contract.getClaimable(wallet),  
                contract.owner()  
            ]);  
  
            const staked = parseFloat(ethers.utils.formatUnits(info[0], 18));  
            const earned = parseFloat(ethers.utils.formatUnits(info[2], 18));  
            const capTime = parseInt(info[6]);  
            const max = staked * 4;  
  
            const isCapped = (max > 0 && earned >= max);  
            const displayClaimable = isCapped ? 0 : parseFloat(ethers.utils.formatUnits(claimable, 18));  
            const remaining = Math.max(max - earned, 0);  
  
            // Update UI  
            document.getElementById("staked").innerText = staked.toFixed(2);  
            document.getElementById("earned").innerText = earned.toFixed(2);  
            document.getElementById("claimable").innerText = displayClaimable.toFixed(2);  
            document.getElementById("limitLabel").innerText = `Remaining Cap: ${remaining.toFixed(2)} DMX`;  
  
            // Percentage Math  
            const pct = max > 0 ? Math.min((earned / max) * 100, 100) : 0;  
            document.getElementById("limitProgress").style.width = pct + "%";  
            document.getElementById("pctText").innerText = pct.toFixed(1) + "%";  
  
            // Button States  
            document.getElementById("claimBtn").disabled = isCapped || (displayClaimable <= 0);  
            document.getElementById("restakeBtn").disabled = (displayClaimable <= 0 && !isCapped);  
  
            // Timer Control  
            if (isCapped && capTime) {  
                document.getElementById("timerSection").style.display = "block";  
                if(!timerInt) runCountdown(capTime + (48 * 3600));  
            } else {  
                document.getElementById("timerSection").style.display = "none";  
                if(timerInt) { clearInterval(timerInt); timerInt = null; }  
            }  
  
            // Admin Control  
            const isAdmin = owner.toLowerCase() === wallet.toLowerCase();  
            document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";  
            document.getElementById("adminTag").style.display = isAdmin ? "inline" : "none";  
  
        } catch (e) { console.error("Update failed", e); }  
    }  
  
    function runCountdown(exp) {  
        if(timerInt) clearInterval(timerInt);  
        timerInt = setInterval(() => {  
            const d = exp - Math.floor(Date.now()/1000);  
            if(d <= 0) {  
                clearInterval(timerInt);  
                timerInt = null;  
                document.getElementById("countdown").innerText = "EXPIRED";  
                document.getElementById("timerMsg").innerText = "48H Period Over. Must Restake.";  
                  
                // Visual Hardening  
                document.getElementById("mainStats").classList.add("expired-state");  
                document.getElementById("capSection").classList.add("expired-state");  
                document.getElementById("claimBtn").classList.add("btn-expired");  
                document.getElementById("claimBtn").disabled = true;  
                document.getElementById("restakeBtn").disabled = false;  
                return;  
            }  
            const h = Math.floor(d/3600), m = Math.floor((d%3600)/60), s = d%60;  
            document.getElementById("countdown").innerText = `${h}h ${m}m ${s}s`;  
        }, 1000);  
    }  
  
    async function txExecute(method, args = []) {  
        if(document.getElementById("networkBanner").style.display === "block") return alert("Switch to BSC Mainnet first.");  
        if(isPending) return;  
        isPending = true;  
        document.getElementById("loader").style.display = "flex";  
        try {  
            const gas = await contract.estimateGas[method](...args);  
            const tx = await contract[method](...args, { gasLimit: gas.mul(120).div(100) });  
            await tx.wait();  
            loadData();  
        } catch (e) {   
            const errorMsg = e?.error?.message || e?.reason || "Transaction failed or rejected.";  
            alert("Blockchain Error: " + errorMsg);  
        } finally {   
            isPending = false;   
            document.getElementById("loader").style.display = "none";   
        }  
    }  
  
    window.handleClaim = () => txExecute('claim');  
    window.handleRestake = () => txExecute('restake');  
    window.updateRate = () => {  
        const rate = document.getElementById("newRate").value;  
        if(rate) txExecute('setRewardRate', [31536000, parseInt(rate)]);  
    };  
  
    window.handleEmergency = async () => {  
        if(!confirm("⚠️ WARNING: Drain ALL contract USDT to Owner wallet?")) return;  
        const usdt = new ethers.Contract(USDT_ADDR, ["function balanceOf(address) view returns(uint256)"], contract.provider);  
        const bal = await usdt.balanceOf(contractAddr);  
        txExecute('emergencyWithdrawToken', [USDT_ADDR, bal]);  
    };  
  
    function cleanup() {  
        if (refreshInterval) clearInterval(refreshInterval);  
        if (timerInt) { clearInterval(timerInt); timerInt = null; }  
        wallet = null;  
        document.getElementById("mainStats").classList.remove("expired-state");  
        document.getElementById("capSection").classList.remove("expired-state");  
        document.getElementById("claimBtn").classList.remove("btn-expired");  
        document.getElementById("staked").innerText = "0.00";  
        document.getElementById("claimable").innerText = "0.00";  
        document.getElementById("earned").innerText = "0.00";  
        document.getElementById("adminPanel").style.display = "none";  
        document.getElementById("timerSection").style.display = "none";  
    }  
</script>  </body>  
</html>
